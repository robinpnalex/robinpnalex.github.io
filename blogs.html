<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>blogs — robin alex</title>
  <link rel="icon" href="images/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; background: #fff; overflow: hidden; font-family: Georgia, serif; }
    body.dark { background: #111; }
    body.dark #robin-logo { filter: invert(1); }

    #robin-logo {
      position: fixed;
      top: clamp(10px, 1vw, 18px);
      left: clamp(10px, 1vw, 18px);
      height: clamp(30px, 3vw, 52px);
      cursor: pointer;
      z-index: 10;
    }

    #list {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5vh;
    }

    #list a {
      text-decoration: none;
      text-align: center;
      display: block;
      transition: transform 0.15s ease;
    }

    #list a.selected { transform: scale(1.2); }

    #list a .title { color: #111; font-size: clamp(18px, 1.8vw, 32px); }
    #list a .date { color: #888; font-size: clamp(11px, 0.85vw, 14px); letter-spacing: 0.1em; margin-top: 6px; }
    body.dark #list a .title { color: #eee; }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      opacity: 0.6;
      font-size: clamp(11px, 0.85vw, 14px);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body class="dark">
  <img id="robin-logo" src="images/robin.svg" alt="back" onclick="window.location.href='index.html'" />

  <div id="list">
    <a href="blogs/looking-inside-a-text-to-image-prompt-generator.html">
      <div class="title">looking inside a text-to-image prompt generator</div>
      <div class="date">jun 2026</div>
    </a>
  </div>

  <div id="hint">&uarr; &darr; &middot; enter</div>

  <script>
    if (localStorage.getItem('dark') === 'off') document.body.classList.remove('dark');

    const links = Array.from(document.querySelectorAll('#list a'));
    let selected = -1;

    function select(index) {
      if (selected >= 0) links[selected].classList.remove('selected');
      selected = (index + links.length) % links.length;
      links[selected].classList.add('selected');
    }

    document.addEventListener('keydown', function (e) {
      const key = e.key.toLowerCase();
      if (key === 'd') {
        const dark = document.body.classList.toggle('dark');
        localStorage.setItem('dark', dark ? 'on' : 'off');
        return;
      }
      if (e.code === 'Escape') { window.location.href = 'index.html#menu'; return; }
      if (e.code === 'ArrowDown' || key === 'j') { e.preventDefault(); select(selected + 1); }
      if (e.code === 'ArrowUp' || key === 'k') { e.preventDefault(); select(selected - 1); }
      if (e.code === 'Enter' && selected >= 0) links[selected].click();
    });
  </script>
</body>
</html>
