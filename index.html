<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>robin alex</title>
  <link rel="icon" href="images/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; background: #fff; overflow: hidden; font-family: Georgia, serif; }

    #site {
      width: 100%;
      height: 100%;
      transition: filter 1.4s ease, opacity 1.4s ease;
    }

    body.intro-running #site {
      filter: blur(14px);
      opacity: 0.35;
      animation: siteReveal 2.4s ease forwards;
    }

    #intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      animation: introFade 2.4s ease forwards;
      pointer-events: none;
    }

    #intro img {
      width: clamp(150px, 34vw, 340px);
      animation: robinIntro 2.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    body.dark #intro {
      background: rgba(17, 17, 17, 0.62);
    }

    body.dark #intro img {
      filter: invert(1);
    }

    @keyframes robinIntro {
      0% {
        opacity: 1;
        transform: scale(1.35);
      }
      58% {
        opacity: 1;
        transform: scale(0.86);
      }
      100% {
        opacity: 0;
        transform: scale(0.34);
      }
    }

    @keyframes introFade {
      0% {
        opacity: 1;
      }
      62% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes siteReveal {
      0% {
        filter: blur(14px);
        opacity: 0.35;
      }
      46% {
        filter: blur(14px);
        opacity: 0.35;
      }
      100% {
        filter: blur(0);
        opacity: 1;
      }
    }

    #home { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    #home span { font-family: Georgia, serif; font-size: clamp(28px, 3vw, 52px); color: #111; }
    body.dark #home span { color: #eee; }

    #menu { display: none; width: 100%; height: 100%; position: relative; }
    #menu.visible { display: block; }

    #menu a {
      position: absolute;
      display: block;
      cursor: pointer;
      text-decoration: none;
      color: #111;
      font-family: Georgia, serif;
      transition: transform 0.15s ease;
    }

    #menu a.selected { transform: scale(1.25); }
    #menu a.soon { opacity: 0.35; cursor: default; }

    #github   { top: 38%; left: 42%; font-size: clamp(18px, 1.8vw, 32px); }
    #art      { top: 35%; left: 54%; font-size: clamp(22px, 2.4vw, 42px); }
    #blogs    { top: 48%; left: 46%; font-size: clamp(16px, 1.6vw, 28px); }
    #projects { top: 53%; left: 34%; font-size: clamp(20px, 2.1vw, 37px); }
    #photos   { top: 57%; left: 52%; font-size: clamp(25px, 2.8vw, 49px); }

    @media (max-width: 640px) {
      #menu.visible {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5vh;
      }
      #menu a { position: static; }
    }

    body.dark { background: #111; }
    body.dark #menu a { color: #eee; }
    body.dark #robin-logo { filter: invert(1); }
    #robin-logo {
      position: fixed;
      top: clamp(10px, 1vw, 18px);
      left: clamp(10px, 1vw, 18px);
      height: clamp(30px, 3vw, 52px);
      cursor: pointer;
      z-index: 10;
    }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      opacity: 0.6;
      font-size: clamp(11px, 0.85vw, 14px);
      letter-spacing: 0.1em;
      z-index: 10;
    }
  </style>
</head>
<body class="intro-running dark">
  <div id="intro" aria-hidden="true">
    <img src="images/robin.svg" alt="" />
  </div>

  <div id="site">
    <img id="robin-logo" src="images/robin.svg" alt="robin" />
    <div id="home">
      <span>robin alex</span>
    </div>

    <div id="menu">
      <a id="github"   href="https://github.com/robinpnalex" target="_blank">github</a>
      <a id="art"      class="soon" href="#">art</a>
      <a id="blogs"    href="blogs.html">blogs</a>
      <a id="projects" class="soon" href="#">projects</a>
      <a id="photos"   href="photos.html">photos</a>
    </div>

    <div id="hint">enter</div>
  </div>

  <script>
    const intro = document.getElementById('intro');
    const home = document.getElementById('home');
    const menu = document.getElementById('menu');
    const hint = document.getElementById('hint');

    const HOME_HINT = 'enter';
    const MENU_HINT = 'first letter · enter · esc';

    if (localStorage.getItem('dark') === 'off') document.body.classList.remove('dark');

    function toggleDark() {
      const dark = document.body.classList.toggle('dark');
      localStorage.setItem('dark', dark ? 'on' : 'off');
    }

    intro.addEventListener('animationend', function () {
      document.body.classList.remove('intro-running');
      intro.remove();
    }, { once: true });

    const keyMap = {
      g: ['github'],
      a: ['art'],
      b: ['blogs'],
      p: ['projects', 'photos'],
    };

    let selected = null;
    let cycleIndex = 0;

    function select(id) {
      if (selected) document.getElementById(selected).classList.remove('selected');
      selected = id;
      document.getElementById(selected).classList.add('selected');
    }

    function deselect() {
      if (selected) document.getElementById(selected).classList.remove('selected');
      selected = null;
    }

    function openMenu() {
      home.style.display = 'none';
      menu.classList.add('visible');
      hint.textContent = MENU_HINT;
    }

    function closeMenu() {
      deselect();
      menu.classList.remove('visible');
      home.style.display = '';
      hint.textContent = HOME_HINT;
    }

    home.querySelector('span').addEventListener('click', openMenu);
    document.getElementById('robin-logo').addEventListener('click', closeMenu);

    function openMenuIfHash() {
      if (location.hash === '#menu') {
        document.body.classList.remove('intro-running');
        const introEl = document.getElementById('intro');
        if (introEl) introEl.remove();
        openMenu();
      }
    }

    openMenuIfHash();
    window.addEventListener('pageshow', function (e) { if (e.persisted) openMenuIfHash(); });
    window.addEventListener('hashchange', openMenuIfHash);

    document.addEventListener('keydown', function (e) {
      const menuOpen = menu.classList.contains('visible');

      if (e.key.toLowerCase() === 'd') { toggleDark(); return; }
      if (e.code === 'Enter' && !menuOpen) { e.preventDefault(); openMenu(); return; }
      if ((e.code === 'Escape' || e.code === 'Backspace') && menuOpen && !selected) { closeMenu(); return; }
      if ((e.code === 'Escape' || e.code === 'Backspace') && menuOpen && selected) { deselect(); return; }

      if (menuOpen && e.code === 'Enter' && selected) {
        e.preventDefault();
        document.getElementById(selected).click();
        return;
      }

      if (menuOpen) {
        const key = e.key.toLowerCase();
        const items = keyMap[key];
        if (!items) return;
        if (items.length === 1) {
          selected === items[0] ? deselect() : select(items[0]);
        } else {
          if (selected && items.includes(selected)) {
            cycleIndex = (items.indexOf(selected) + 1) % items.length;
          } else {
            cycleIndex = 0;
          }
          select(items[cycleIndex]);
        }
      }
    });
  </script>
</body>
</html>
