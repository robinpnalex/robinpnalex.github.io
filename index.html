<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>robin alex</title>
  <link rel="icon" href="images/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; background: #fff; overflow: hidden; font-family: Georgia, serif; }

    #home { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    #home img { max-width: 90vw; max-height: 90vh; }

    #menu { display: none; width: 100%; height: 100%; position: relative; }
    #menu.visible { display: block; }

    #menu a {
      position: absolute;
      display: block;
      cursor: pointer;
      text-decoration: none;
      color: #111;
      font-family: Georgia, serif;
      transition: transform 0.15s ease;
    }

    #menu a.selected { transform: scale(1.25); }

    #github   { top: 38%; left: 42%; font-size: 1.8vw; }
    #art      { top: 35%; left: 54%; font-size: 2.4vw; }
    #blogs    { top: 48%; left: 46%; font-size: 1.6vw; }
    #projects { top: 53%; left: 34%; font-size: 2.1vw; }
    #photos   { top: 57%; left: 52%; font-size: 2.8vw; }
  </style>
</head>
<body>
  <div id="home">
    <img src="images/img.png" alt="robin alex" />
  </div>

  <div id="menu">
    <a id="github"   href="#">github</a>
    <a id="art"      href="#">art</a>
    <a id="blogs"    href="#">blogs</a>
    <a id="projects" href="#">projects</a>
    <a id="photos"   href="#">photos</a>
  </div>

  <script>
    const home = document.getElementById('home');
    const menu = document.getElementById('menu');

    const keyMap = {
      g: ['github'],
      a: ['art'],
      b: ['blogs'],
      p: ['projects', 'photos'],
    };

    let selected = null;
    let cycleIndex = 0;

    function select(id) {
      if (selected) document.getElementById(selected).classList.remove('selected');
      selected = id;
      document.getElementById(selected).classList.add('selected');
    }

    function deselect() {
      if (selected) document.getElementById(selected).classList.remove('selected');
      selected = null;
    }

    function openMenu() {
      home.style.display = 'none';
      menu.classList.add('visible');
    }

    function closeMenu() {
      deselect();
      menu.classList.remove('visible');
      home.style.display = '';
    }

    home.querySelector('img').addEventListener('click', openMenu);

    document.addEventListener('keydown', function (e) {
      const menuOpen = menu.classList.contains('visible');

      if (e.code === 'Enter' && !menuOpen) { e.preventDefault(); openMenu(); return; }
      if (e.code === 'Escape' && menuOpen && !selected) { closeMenu(); return; }
      if (e.code === 'Escape' && menuOpen && selected) { deselect(); return; }

      if (menuOpen && e.code === 'Enter' && selected) {
        e.preventDefault();
        document.getElementById(selected).click();
        return;
      }

      if (menuOpen) {
        const key = e.key.toLowerCase();
        const items = keyMap[key];
        if (!items) return;
        if (items.length === 1) {
          selected === items[0] ? deselect() : select(items[0]);
        } else {
          if (selected && items.includes(selected)) {
            cycleIndex = (items.indexOf(selected) + 1) % items.length;
          } else {
            cycleIndex = 0;
          }
          select(items[cycleIndex]);
        }
      }
    });
  </script>
</body>
</html>
