<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>photos — robin alex</title>
  <link rel="icon" href="images/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; background: #fff; overflow: hidden; font-family: Georgia, serif; }
    body.dark { background: #111; }
    body.dark #back { filter: invert(1); }

    #slideshow { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

    #slideshow img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      user-select: none;
    }

    #counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: clamp(12px, 0.85vw, 15px);
      letter-spacing: 0.1em;
    }

    #back {
      position: fixed;
      top: clamp(10px, 1vw, 18px);
      left: clamp(10px, 1vw, 18px);
      cursor: pointer;
      height: clamp(30px, 3vw, 52px);
    }
  </style>
</head>
<body class="dark">
  <img id="back" src="images/robin.svg" alt="back" onclick="window.location.href='index.html'" />

  <div id="slideshow">
    <img id="photo" src="" alt="photo" />
    <span id="empty" style="display: none; color: #888; font-size: clamp(14px, 1.2vw, 18px); letter-spacing: 0.1em;">photos coming soon</span>
  </div>

  <div id="counter"></div>

  <script>
    const photos = [
      'photos/DSCN4769.JPG',
      'photos/DSCN4875.JPG',
      'photos/DSCN4920.JPG',
      'photos/DSCN4952.JPG',
      'photos/DSCN4989.JPG',
      'photos/DSCN4999.JPG',
      'photos/DSCN5011.JPG',
      'photos/DSCN5013.JPG',
      'photos/DSCN5014.JPG',
      'photos/DSCN5029.JPG',
      'photos/DSCN5032.JPG',
      'photos/DSCN5043.JPG',
      'photos/DSCN5048.JPG',
      'photos/DSCN5058.JPG',
      'photos/DSCN5086.JPG',
    ];

    let current = 0;
    const photoEl = document.getElementById('photo');
    const counterEl = document.getElementById('counter');
    const emptyEl = document.getElementById('empty');

    if (localStorage.getItem('dark') === 'off') document.body.classList.remove('dark');

    photoEl.addEventListener('error', function () {
      photoEl.style.display = 'none';
      counterEl.textContent = '';
      emptyEl.style.display = '';
    });

    photoEl.addEventListener('load', function () {
      photoEl.style.display = '';
      emptyEl.style.display = 'none';
    });

    function show(index) {
      if (photos.length === 0) {
        photoEl.style.display = 'none';
        emptyEl.style.display = '';
        return;
      }
      current = (index + photos.length) % photos.length;
      photoEl.src = photos[current];
      counterEl.textContent = (current + 1) + ' / ' + photos.length;
    }

    show(0);

    document.addEventListener('keydown', function (e) {
      if (e.code === 'ArrowRight') show(current + 1);
      if (e.code === 'ArrowLeft')  show(current - 1);
      if (e.code === 'Escape') window.location.href = 'index.html';
      if (e.key.toLowerCase() === 'd') {
        const dark = document.body.classList.toggle('dark');
        localStorage.setItem('dark', dark ? 'on' : 'off');
      }
    });

    document.getElementById('slideshow').addEventListener('click', function (e) {
      if (e.clientX < window.innerWidth / 2) show(current - 1);
      else show(current + 1);
    });
  </script>
</body>
</html>
